name: Record Claim

on:
  repository_dispatch:
    types: [claim]

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record claim
        run: |
          mkdir -p claims
          FILENAME=$(echo "${{ github.event.client_payload.addr }}" | tr -d ' ' | cut -c1-20)
          echo '{"addr":"${{ github.event.client_payload.addr }}","ref":"${{ github.event.client_payload.ref }}","time":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}' > "claims/${FILENAME}_$(date +%s).json"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add claims/
          git diff --staged --quiet || git commit -m "claim: ${{ github.event.client_payload.addr }}"
          git push
